[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,VITE_SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY,VITE_SUPABASE_PUBLISHABLE_KEY"
  SECRETS_SCAN_OMIT_PATHS = ".env,.netlify/functions-internal/**"

[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "none"
  included_files = [".netlify/functions-internal/**"]
